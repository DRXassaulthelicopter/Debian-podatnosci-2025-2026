# =============================================================================
# CVE Scan API — konfiguracja nginx (reverse proxy)
# Skopiuj do /etc/nginx/sites-available/cve-scan-api
# Włącz: sudo ln -s /etc/nginx/sites-available/cve-scan-api /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# Upstream — adres zgodny z CVE_LISTEN i CVE_PORT w scanner.env
upstream cve_scan_api {
    server 127.0.0.1:8088;
    keepalive 16;
}

# Limit żądań per IP — ochrona przed nadmiernym obciążeniem przy skanowaniach
limit_req_zone $binary_remote_addr zone=cve_api_rl:10m rate=2r/s;

server {
    listen 80;
    server_name scanner.local;

    # Przekieruj HTTP → HTTPS (zalecane w produkcji)
    # return 301 https://$host$request_uri;

    # Timeouty dopasowane do długich skanów (debsecan + NVD per CVE)
    proxy_connect_timeout  10s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;

    # Zgodny z CVE_MAX_BODY w scanner.env
    client_max_body_size 1m;

    location / {
        # Rate limiting — burst 10 żądań, bez kolejkowania
        limit_req zone=cve_api_rl burst=10 nodelay;

        proxy_http_version 1.1;
        proxy_set_header Connection  "";
        proxy_set_header Host        $host;
        proxy_set_header X-Real-IP   $remote_addr;

        # Przekaż lub wygeneruj request-id dla korelacji logów
        proxy_set_header X-Request-Id $request_id;

        proxy_pass http://cve_scan_api;
    }
}

